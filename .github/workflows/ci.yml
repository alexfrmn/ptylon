name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: PTY gateway smoke
        run: pnpm test:pty-gateway

      - name: Production dependency audit
        run: pnpm audit --prod --audit-level=high

      - name: Install browser regression runtime
        run: pnpm exec playwright install --with-deps chromium

      - name: Browser regression
        env:
          AUTH_PASSWORD: ci-password-only
          JWT_SECRET: ci-jwt-secret-change-me
          WEB_CONSOLE_ADMIN_TOKEN: ci-admin-token-change-me
          PORT: 8790
          WS_PORT: 8791
          PTY_DAEMON_HOST: 127.0.0.1
          PTY_DAEMON_PORT: 8792
          PTY_DAEMON_URL: ws://127.0.0.1:8792
          WORKSPACE_ROOT: ${{ github.workspace }}
          FILE_ACCESS_ROOT: ${{ github.workspace }}
          ALLOWED_CWD_ROOT: ${{ github.workspace }}
          UPLOAD_DIR: ${{ github.workspace }}/uploads
          WC_BASE_URL: http://127.0.0.1:8790
          WC_WS_URL: ws://127.0.0.1:8791
          WC_AUTH_PASSWORD: ci-password-only
          WC_ADMIN_TOKEN: ci-admin-token-change-me
        run: |
          set -euo pipefail
          export CHROME="$(node --input-type=module -e "import { chromium } from 'playwright'; console.log(chromium.executablePath())")"
          node server/pty-daemon.mjs & pty_pid=$!
          node server/ws-server.mjs & ws_pid=$!
          node .next/standalone/server.js & app_pid=$!
          trap 'kill "$app_pid" "$ws_pid" "$pty_pid" 2>/dev/null || true' EXIT
          for _ in $(seq 1 30); do curl --fail --silent http://127.0.0.1:8790/api/auth >/dev/null && break; sleep 1; done
          pnpm test:browser-regression
